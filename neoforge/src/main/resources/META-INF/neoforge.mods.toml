modLoader = "javafml"
loaderVersion = "${neoforge_loader_version_range}"
license = "All rights reserved"
issueTrackerURL="https://github.com/MincraftEinstein/SubtleEffects/issues"

[[mods]]
    modId = "subtle_effects"
    version = "${version}"
    displayName = "Subtle Effects"
    displayURL="https://curseforge.com/minecraft/mods/subtle-effects"
    #updateJSONURL="https://change.me.example.invalid/updates.json"
    logoFile = "pack.png"
    credits = ""
    authors = "${mod_author}"
    description = "${description}"

[modProperties]
    fzzy_config = "subtle_effects"

[modproperties.modmenu]
    sources = "https://github.com/MincraftEinstein/SubtleEffects"
    links = [
        "mod_menu.modrinth=https://modrinth.com/mod/subtle-effects",
        "mod_menu.curseforge=https://curseforge.com/minecraft/mc-mods/subtle-effects",
        "mod_menu.discord=https://discord.gg/gSsaFAvrBM",
        "mod_menu.kofi=https://ko-fi.com/mincrafteinstein",
        "mod_menu.wiki=https://github.com/MincraftEinstein/SubtleEffects/wiki"
    ]

[[accessTransformers]]
    file = "META-INF/accesstransformer.cfg"

[[mixins]]
    config = "${mod_id}.mixins.json"

[[mixins]]
    config = "${mod_id}.neoforge.mixins.json"

[[dependencies.subtle_effects]]
    modId = "neoforge"
    type = "required"
    versionRange = "[${neoforge_version},)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.subtle_effects]]
    modId = "minecraft"
    type = "required"
    versionRange = "[${minecraft_version}, ${max_minecraft_version})"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.subtle_effects]]
    modId = "fzzy_config"
    type = "required"
    versionRange = "[${fzzy_config_version},)"
    ordering = "NONE"
    side = "CLIENT"
